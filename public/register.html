<html>
<head>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex justify-center items-center h-screen">
<form action="/register" method="POST" class="bg-white p-6 rounded">
<h1 class="text-2xl mb-4">Register</h1>
<input name="name" placeholder="Name" class="border p-2 w-full mb-2"><br>
<input name="email" placeholder="Email" class="border p-2 w-full mb-2"><br>
<input name="password" type="password" placeholder="Password" class="border p-2 w-full mb-2"><br>
<button class="bg-green-500 text-white px-4 py-2">Register</button>
</form>
</body>
</html>
